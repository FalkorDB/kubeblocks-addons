name: Release FalkorDB Chart

on:
  workflow_call:
    inputs:
      VERSION:
        description: "Chart version to release (e.g. 0.1.0). Defaults to version in Chart.yaml."
        type: string
        required: false
        default: ""
      CHART_DIR:
        description: "Chart directory (default: addons/falkordb)"
        type: string
        required: false
        default: "addons/falkordb"
      DRY_RUN:
        description: "Skip push/release steps (for testing)"
        type: boolean
        required: false
        default: false
env:
  HELM_VERSION: "v3.16.3"
  CHART_DIR: ${{ inputs.CHART_DIR || 'addons/falkordb' }}

jobs:
  release-falkordb-chart:
    name: Release ${{ inputs.CHART_DIR || 'addons/falkordb' }}
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Determine chart version
        id: version
        shell: bash
        run: |
          version="${{ inputs.VERSION }}"
          # Strip leading 'v' if present
          version="${version#v}"
          if [[ -z "$version" ]]; then
            version=$(grep '^version:' ${{ env.CHART_DIR }}/Chart.yaml | awk '{print $2}')
          fi
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "Chart version: ${version}"

      - name: Helm lint
        run: helm lint ${{ env.CHART_DIR }}

      - name: Package Helm chart
        run: |
          mkdir -p .cr-release-packages
          helm package ${{ env.CHART_DIR }} \
            --version "${{ steps.version.outputs.version }}" \
            --destination .cr-release-packages
          ls -la .cr-release-packages/

      - name: Log in to GitHub Container Registry
        if: ${{ !inputs.DRY_RUN }}
        run: |
          echo "${{ github.token }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR (OCI)
        if: ${{ !inputs.DRY_RUN }}
        run: |
          helm push \
            .cr-release-packages/falkordb-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository }}

      - name: Create GitHub Release and upload chart artifact
        if: ${{ !inputs.DRY_RUN }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="falkordb-${{ steps.version.outputs.version }}"
          # Create or update the release
          if gh release view "${TAG}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists, uploading assets only."
            gh release upload "${TAG}" \
              .cr-release-packages/*.tgz \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "${TAG}" \
              .cr-release-packages/*.tgz \
              --repo "${{ github.repository }}" \
              --title "FalkorDB Chart ${{ steps.version.outputs.version }}" \
              --notes "## FalkorDB Helm Chart ${{ steps.version.outputs.version }}\n\nInstall via OCI:\n\`\`\`bash\nhelm install falkordb oci://ghcr.io/${{ github.repository }}/falkordb --version ${{ steps.version.outputs.version }}\n\`\`\`"
          fi
