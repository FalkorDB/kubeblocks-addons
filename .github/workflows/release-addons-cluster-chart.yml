name: Release FalkorDB Cluster Chart

on:
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'Chart version to release (e.g. 0.1.0). Defaults to version in Chart.yaml.'
        required: false
        default: ''
        type: string
      DRY_RUN:
        description: 'Skip push/release steps (for testing)'
        required: false
        default: false
        type: boolean

run-name: Release FalkorDB Cluster Chart ${{ inputs.VERSION || '(auto)' }}

jobs:
  release-chart:
    uses: ./.github/workflows/release-chart.yml
    with:
      VERSION: "${{ inputs.VERSION }}"
      DRY_RUN: ${{ inputs.DRY_RUN || false }}
    permissions:
      contents: write
      packages: write
