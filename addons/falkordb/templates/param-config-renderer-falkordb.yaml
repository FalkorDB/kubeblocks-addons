{{- range .Values.falkordbVersions }}
---
apiVersion: parameters.kubeblocks.io/v1alpha1
kind: ParamConfigRenderer
metadata:
  name: {{ printf "falkordb%s-pcr-%s" .major $.Chart.Version }}
  annotations:
    {{- include "falkordb.annotations" $ | nindent 4 }}
  labels:
    {{- include "falkordb.labels" $ | nindent 4 }}
spec:
  componentDef: {{ printf "%s-%s" .componentDef $.Chart.Version }}
  configs:
    - fileFormatConfig:
        format: redis
      name: redis.conf
      reRenderResourceTypes:
        - vscale
        - tls
      templateName: falkordb-replication-config
  parametersDefs:
    - {{ printf "falkordb%s-config-pd" .major }}
{{- end }}